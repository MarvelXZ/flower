# PlantOps Mosquitto MQTT Broker Configuration
# =================================================
# This configuration supports both MQTT (port 1883) and
# WebSocket (port 9001) connections.

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all

# Listeners
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Authentication (development: anonymous allowed)
# Production: replace with password_file + ACL
allow_anonymous true

# Connection limits
max_connections -1
max_queued_messages 1000

# Keep alive
max_keepalive 600
