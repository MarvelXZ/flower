version: "3.9"

services:
  # -------------------------------------------------------------------------
  # PostgreSQL 16 — Multi-tenant database
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: plantops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plantops}
      POSTGRES_USER: ${POSTGRES_USER:-plantops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plantops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plantops} -d ${POSTGRES_DB:-plantops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plantops

  # -------------------------------------------------------------------------
  # Redis — Cache, sessions, Celery result backend
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: plantops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - plantops

  # -------------------------------------------------------------------------
  # RabbitMQ — Celery broker
  # -------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: plantops_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-plantops}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-plantops}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plantops

  # -------------------------------------------------------------------------
  # Mosquitto — MQTT broker for IoT devices
  # -------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: plantops_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - plantops
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "ok"]
      interval: 15s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Django Backend
  # -------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: development
    container_name: plantops_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app:cached
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - plantops
    command: >
      sh -c "python manage.py migrate_schemas --shared &&
             python manage.py migrate_schemas --tenant &&
             python manage.py runserver 0.0.0.0:8000"

  # -------------------------------------------------------------------------
  # Celery Worker
  # -------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: development
    container_name: plantops_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app:cached
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - plantops
    command: >
      sh -c "celery -A config worker -l info --concurrency=2"

  # -------------------------------------------------------------------------
  # Celery Beat (Scheduler)
  # -------------------------------------------------------------------------
  celery_beat:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: development
    container_name: plantops_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app:cached
      - celery_beat_data:/app/celerybeat_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - plantops
    command: >
      sh -c "celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"

  # -------------------------------------------------------------------------
  # Frontend (Vite + React)
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
      target: development
    container_name: plantops_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - plantops
    command: >
      sh -c "npm run dev -- --host"

  # -------------------------------------------------------------------------
  # Nginx (Reverse Proxy)
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: plantops_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/srv/static:ro
      - backend_media:/srv/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - plantops

  # -------------------------------------------------------------------------
  # PgAdmin (Database Management)
  # -------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: plantops_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@plantops.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - plantops

  # -------------------------------------------------------------------------
  # Flower (Celery Monitoring)
  # -------------------------------------------------------------------------
  flower:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: development
    container_name: plantops_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantops
    command: >
      sh -c "celery -A config flower --port=5555 --broker_api=http://${RABBITMQ_DEFAULT_USER:-plantops}:${RABBITMQ_DEFAULT_PASS:-plantops}@rabbitmq:15672/api/"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  celery_beat_data:
  backend_static:
  backend_media:
  pgadmin_data:
  mosquitto_data:
  mosquitto_log:

# =============================================================================
# Networks
# =============================================================================
networks:
  plantops:
    driver: bridge
