version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: flower_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flower}
      POSTGRES_USER: ${POSTGRES_USER:-flower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flower}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flower} -d ${POSTGRES_DB:-flower}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flower

  redis:
    image: redis:7-alpine
    container_name: flower_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - flower

  mqtt:
    image: eclipse-mosquitto:2
    container_name: flower_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    networks:
      - flower

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: development
    container_name: flower_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
    volumes:
      - ./backend:/app:cached
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    networks:
      - flower
    command: >
      sh -c "python manage.py migrate_schemas --shared &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: development
    container_name: flower_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MQTT_HOST: mqtt
    volumes:
      - ./backend:/app:cached
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flower
    command: celery -A config worker -l info --concurrency=2

  nginx:
    image: nginx:alpine
    container_name: flower_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/srv/static:ro
      - backend_media:/srv/media:ro
    depends_on:
      - backend
    networks:
      - flower

volumes:
  postgres_data:
  redis_data:
  mqtt_data:
  mqtt_log:
  backend_static:
  backend_media:

networks:
  flower:
    driver: bridge
